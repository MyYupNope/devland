<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description"
        content="Kinetic particle sculpture — type your message and watch it come alive as an interactive 3D particle display. Hover to disturb, tap 5x to explode.">
    <title>Kinetic Particle Sculpture</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div id="control-panel">
        <div class="control-group">
            <label for="text-input">Text</label>
            <input type="text" id="text-input" value="Define your message!" maxlength="25" autocomplete="off">
        </div>
    </div>

    <div id="overlay">Arrows / 2-Finger Slide to rotate • +/- / Pinch to zoom • Tap 5x to Explode</div>

    <script type="module" src="/main.js"></script>
</body>

</html>
